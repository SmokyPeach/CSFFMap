<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gio's Interactive CSFF Map</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            /* ÄNDRAT: Bakgrunden är nu vit för att indexet ska synas tydligt */
            background-color: #ffffff; 
            user-select: none;
            font-family: sans-serif;
        }

        /* 1. KARTAN (Underst) */
        #viewport {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0; left: 0;
            cursor: grab;
            overflow: hidden;
            z-index: 1;
        }
        #viewport:active { cursor: grabbing; }

        #map {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            display: block;
            /* LAGT TILL: En subtil skugga så kartan syns mot den vita bakgrunden */
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
        }

        /* 2. HUD / INDEX-RAM (Mitten) */
        #hud-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            
            background-image: url('CardforestMapIndex.png');
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            
            pointer-events: none; 
        }

        /* 3. KONTROLLER (Överst) */
        #controls {
            position: fixed;
            /* Justerat positionen så de hamnar precis över dina befintliga knappar i bilden */
            bottom: 30px;
            right: 30px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
        }

        .btn {
            width: 45px;
            height: 45px;
            /* ÄNDRAT: Knapparna är nu mörkgrå/svarta för att synas mot vitt */
            background: #1a1a1a;
            color: #daa520;
            border: 2px solid #daa520;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        .btn:hover { background: #333; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="viewport">
        <img id="map" src="BestMapYet.jpg" alt="Spelkarta">
    </div>

    <div id="hud-overlay"></div>

    <div id="controls">
        <button class="btn" onclick="zoom(0.2)" title="Zooma in">+</button>
        <button class="btn" onclick="zoom(-0.2)" title="Zooma ut">−</button>
        <button class="btn" onclick="resetMap()" title="Återställ vy">🏠</button>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const map = document.getElementById('map');

        let scale = 1;
        // Justerad startposition så kartan hamnar mer i mitten av "hålet" direkt
        let pos = { x: window.innerWidth * 0.25, y: window.innerHeight * 0.25 };
        let isDragging = false;
        let start = { x: 0, y: 0 };

        function update() {
            map.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(${scale})`;
        }

        function zoom(delta) {
            const oldScale = scale;
            scale = Math.min(Math.max(0.1, scale + delta), 5);
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            pos.x = centerX - (centerX - pos.x) * (scale / oldScale);
            pos.y = centerY - (centerY - pos.y) * (scale / oldScale);
            
            update();
        }

        function resetMap() {
            scale = 0.6; // Starta lite utzoomat så man ser mer av kartan i hålet
            pos = { x: window.innerWidth * 0.25, y: window.innerHeight * 0.25 };
            update();
        }

        viewport.onwheel = (e) => {
            e.preventDefault();
            const delta = -Math.sign(e.deltaY) * 0.15;
            zoom(delta);
        };

        viewport.onmousedown = (e) => {
            isDragging = true;
            start = { x: e.clientX - pos.x, y: e.clientY - pos.y };
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            pos.x = e.clientX - start.x;
            pos.y = e.clientY - start.y;
            update();
        };

        window.onmouseup = () => isDragging = false;

        update();
    </script>
</body>
</html>
