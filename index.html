<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmokyPeach's Interactive CSFF Map</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: #ffffff;
            user-select: none;
            font-family: sans-serif;
        }

        /* 1. VIEWPORT */
        #viewport {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0; left: 0;
            cursor: grab;
            overflow: hidden;
            z-index: 1;
        }
        #viewport:active { cursor: grabbing; }

        #map {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            display: block;
            box-shadow: 0 0 30px rgba(0,0,0,0.15);
            pointer-events: none; 
        }

        /* 2. HUD / INDEX-RAM */
        #hud-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            background-image: url('CardforestMapIndex.png');
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none; 
            /* SOFT TRANSITION WHEN HIDING INDEX */
            transition: opacity 0.4s ease; 
            opacity: 1;
        }

        /* FEATURE FOR HIDING INDEX */
        .hidden-hud {
            opacity: 0 !important;
        }

        /* 3. CONTROLLER */
        #controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
        }

        .btn {
            width: 50px;
            height: 50px;
            background: #1a1a1a;
            color: #daa520;
            border: 2px solid #daa520;
            border-radius: 10px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        .btn:hover { background: #333; transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        
        /* HIGHLIGHT FOR HIDE BUTTON */
        .btn.active {
            background: #daa520;
            color: #1a1a1a;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <img id="map" src="BestMapYet.jpg" alt="Spelkarta" draggable="false">
    </div>

    <div id="hud-overlay"></div>

    <div id="controls">
        <button class="btn" onclick="zoom(0.2)" title="Zooma in">+</button>
        <button class="btn" onclick="zoom(-0.2)" title="Zooma ut">−</button>
        <button class="btn" onclick="toggleHUD(this)" title="Visa/Dölj Index">👁️</button>
        <button class="btn" onclick="resetMap()" title="Återställ vy">🏠</button>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const map = document.getElementById('map');
        const hud = document.getElementById('hud-overlay');

        // SETTINGS FOR STARTING VIEW
        let scale = 0.50; 
        let pos = { x: 0, y: 0 };
        let isDragging = false;
        let start = { x: 0, y: 0 };

        function update() {
            map.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(${scale})`;
        }

        // AUTOCENTER FUNCTION
        function centerMap() {
            pos.x = (window.innerWidth - (map.offsetWidth * scale)) / 2;
            pos.y = (window.innerHeight - (map.offsetHeight * scale)) / 2;
            update();
        }

        // FUNCTION FOR HIDE/SHOW INDEX
        function toggleHUD(button) {
            hud.classList.toggle('hidden-hud');
            button.classList.toggle('active');
        }

        function zoom(delta) {
            const oldScale = scale;
            scale = Math.min(Math.max(0.1, scale + delta), 5);
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            pos.x = centerX - (centerX - pos.x) * (scale / oldScale);
            pos.y = centerY - (centerY - pos.y) * (scale / oldScale);
            update();
        }

        function resetMap() {
            scale = 0.50;
            centerMap();
        }

        viewport.onwheel = (e) => {
            e.preventDefault();
            zoom(-Math.sign(e.deltaY) * 0.2);
        };

        viewport.onmousedown = (e) => {
            isDragging = true;
            start = { x: e.clientX - pos.x, y: e.clientY - pos.y };
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            pos.x = e.clientX - start.x;
            pos.y = e.clientY - start.y;
            update();
        };

        window.onmouseup = () => isDragging = false;

        // CENTRATION ON MAP LOAD FINISH
        if (map.complete) {
            centerMap();
        } else {
            map.onload = centerMap;
        }

        // DYNAMIC RESIZE ON BROWSER SCALE
        window.onresize = centerMap;

    </script>
</body>
</html>
