<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gio's Interactive CSFF Map</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: #1a1a1a; /* Bakgrundsfärg som syns bakom kartan */
            user-select: none;
            font-family: sans-serif;
        }

        /* 1. KARTAN (Underst) */
        #viewport {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0; left: 0;
            cursor: grab;
            overflow: hidden;
            z-index: 1; /* Lägsta lagret */
        }
        #viewport:active { cursor: grabbing; }

        #map {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            display: block;
        }

        /* 2. HUD / INDEX-RAM (Mitten) */
        #hud-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10; /* Ovanpå kartan */
            
            /* Här läggs din bild in som täcker hela skärmen */
            background-image: url('CardforestMapIndex.png');
            background-size: contain; /* Anpassar bilden så hela syns */
            background-repeat: no-repeat;
            background-position: center;
            
            /* GÖR ATT MAN KAN KLICKA IGENOM RAMEN TILL KARTAN */
            pointer-events: none; 
        }

        /* 3. KONTROLLER (Överst) */
        #controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 20; /* Alltid överst */
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto; /* Gör knapparna klickbara */
        }

        .btn {
            width: 45px;
            height: 45px;
            background: rgba(26, 26, 26, 0.9);
            color: #daa520;
            border: 2px solid #daa520;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        .btn:hover { background: #daa520; color: #111; }
    </style>
</head>
<body>

    <!-- Kartan som man kan flytta på -->
    <div id="viewport">
        <img id="map" src="BestMapYet.jpg" alt="Spelkarta">
    </div>

    <!-- Din ram med alla boxar (Ska ha genomskinlig mitt) -->
    <div id="hud-overlay"></div>

    <!-- Knappar för zoom -->
    <div id="controls">
        <button class="btn" onclick="zoom(0.2)" title="Zooma in">+</button>
        <button class="btn" onclick="zoom(-0.2)" title="Zooma ut">−</button>
        <button class="btn" onclick="resetMap()" title="Återställ vy">🏠</button>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const map = document.getElementById('map');

        let scale = 1;
        let pos = { x: 100, y: 100 };
        let isDragging = false;
        let start = { x: 0, y: 0 };

        function update() {
            map.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(${scale})`;
        }

        function zoom(delta) {
            const oldScale = scale;
            scale = Math.min(Math.max(0.1, scale + delta), 5);
            
            // Zoomar mot mitten av skärmen
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            pos.x = centerX - (centerX - pos.x) * (scale / oldScale);
            pos.y = centerY - (centerY - pos.y) * (scale / oldScale);
            
            update();
        }

        function resetMap() {
            scale = 1;
            pos = { x: 100, y: 100 };
            update();
        }

        // Scroll-zoom
        viewport.onwheel = (e) => {
            e.preventDefault();
            const delta = -Math.sign(e.deltaY) * 0.2;
            zoom(delta);
        };

        // Drag-logik
        viewport.onmousedown = (e) => {
            isDragging = true;
            start = { x: e.clientX - pos.x, y: e.clientY - pos.y };
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            pos.x = e.clientX - start.x;
            pos.y = e.clientY - start.y;
            update();
        };

        window.onmouseup = () => isDragging = false;

        // Starta kartan
        update();
    </script>

</body>
</html>
